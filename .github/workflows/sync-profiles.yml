name: Sync Profiles Cache

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and encrypt profiles
        env:
          API_URL: ${{ secrets.API_URL }}
          DUMP_SECRET: ${{ secrets.DUMP_SECRET }}
          ENCRYPT_KEY: ${{ secrets.ENCRYPT_KEY }}
        run: |
          set -e
          echo "Fetching profiles..."
          curl -sL -o /tmp/response.json "${API_URL}?action=dumpProfiles&secret=${DUMP_SECRET}" --max-time 120
          echo "Response size: $(wc -c < /tmp/response.json) bytes"
          cat /tmp/response.json | head -c 300
          echo ""

      - name: Process and encrypt
        env:
          ENCRYPT_KEY: ${{ secrets.ENCRYPT_KEY }}
        shell: python3 {0}
        run: |
          import json, base64, os, sys

          key = os.environ['ENCRYPT_KEY']

          with open('/tmp/response.json', 'r') as f:
              raw = f.read()

          resp = json.loads(raw)
          if not resp.get('ok'):
              print(f"API error: {resp.get('error', 'unknown')}")
              sys.exit(1)

          profiles = resp.get('data', {}).get('profiles', [])
          ads = resp.get('data', {}).get('ads', [])
          ts = resp.get('data', {}).get('ts', 0)
          print(f"Got {len(profiles)} profiles, {len(ads)} ads, ts={ts}")

          payload = json.dumps({'profiles': profiles, 'ads': ads, 'ts': ts}, separators=(',', ':'))

          encrypted = []
          for i, ch in enumerate(payload):
              encrypted.append(chr(ord(ch) ^ ord(key[i % len(key)])))
          encoded = base64.b64encode(''.join(encrypted).encode('latin-1')).decode('ascii')

          out = {'d': encoded, 'ts': ts}
          os.makedirs('v2/data', exist_ok=True)
          with open('v2/data/profiles.json', 'w') as f:
              json.dump(out, f, separators=(',', ':'))

          print(f"Encrypted and saved {len(profiles)} profiles ({len(encoded)} bytes)")

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add v2/data/profiles.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: sync profiles cache [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
