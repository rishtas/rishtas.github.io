name: Sync Profiles Cache

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and encrypt profiles
        env:
          API_URL: ${{ secrets.API_URL }}
          DUMP_SECRET: ${{ secrets.DUMP_SECRET }}
          ENCRYPT_KEY: ${{ secrets.ENCRYPT_KEY }}
        run: |
          # Fetch profiles from Apps Script
          RESPONSE=$(curl -sL "${API_URL}?action=dumpProfiles&secret=${DUMP_SECRET}")
          
          # Check if response is valid
          OK=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ok',''))" 2>/dev/null)
          if [ "$OK" != "True" ]; then
            echo "API returned error or invalid response"
            echo "$RESPONSE" | head -c 200
            exit 1
          fi
          
          # Extract profiles data
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          profiles = d.get('data', {}).get('profiles', [])
          ts = d.get('data', {}).get('ts', 0)
          print(json.dumps({'profiles': profiles, 'ts': ts}, separators=(',', ':')))
          " > /tmp/profiles_raw.json
          
          # Encrypt with XOR + base64 (same algo as frontend)
          python3 -c "
          import base64, json, sys, os
          key = os.environ['ENCRYPT_KEY']
          with open('/tmp/profiles_raw.json', 'r') as f:
              data = f.read()
          encrypted = []
          for i, ch in enumerate(data):
              encrypted.append(chr(ord(ch) ^ ord(key[i % len(key)])))
          encoded = base64.b64encode(''.join(encrypted).encode('latin-1')).decode('ascii')
          # Write as JSON with timestamp
          out = {'d': encoded, 'ts': json.loads(data).get('ts', 0)}
          with open('v2/data/profiles.json', 'w') as f:
              json.dump(out, f, separators=(',', ':'))
          print(f'Encrypted {len(json.loads(data).get(\"profiles\", []))} profiles')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add v2/data/profiles.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: sync profiles cache [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
